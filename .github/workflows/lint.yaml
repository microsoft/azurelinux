name: "Lint"
on:
  pull_request:
  push:
    branches:
      - toml

# Cancel in-progress runs of this workflow if a new run is triggered.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: "Validate TOML config"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: stable
          cache: false

      - name: Install azldev
        run: go install github.com/microsoft/azure-linux-dev-tools/cmd/azldev@main

      - name: "Validate config (strict)"
        run: azldev config dump > /dev/null
   