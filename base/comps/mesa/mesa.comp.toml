[components.mesa]

# Use RHEL-like feature set: disable GPU drivers and features not relevant
# for a cloud/server distro (teflon, opencl, asahi, d3d12, embedded ARM GPUs,
# old AMD/Intel drivers, etc.). Keeps llvmpipe (SW raster), virgl (virtio-gpu),
# radeonsi, iris/crocus, vmware (svga), and basic Vulkan.
[components.mesa.build]
defines = { rhel = "10" }

# RHEL uses rust-toolset (a meta-package) instead of cargo-rpm-macros for Rust
# builds. AZL doesn't have rust-toolset — use cargo-rpm-macros like Fedora.
[[components.mesa.overlays]]
description = "Remove unavailable rust-toolset build dependency"
type = "spec-remove-tag"
tag = "BuildRequires"
value = "rust-toolset"

[[components.mesa.overlays]]
description = "Add cargo-rpm-macros — Fedora-style Rust build macros used by Azure Linux"
type = "spec-add-tag"
tag = "BuildRequires"
value = "cargo-rpm-macros"
