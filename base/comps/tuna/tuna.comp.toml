[components.tuna]

# Disable the optional `oscilloscope` sub-package. Tuna's spec gates it
# on `%bcond oscilloscope %{undefined rhel}` so it builds by default on
# Fedora-like systems. The oscilloscope sub-package is a matplotlib-GTK3
# visualizer for tuna data; AZL is a headless cloud distro with no
# python3-matplotlib-gtk3 in base. Disabling the bcond stops producing
# the oscilloscope sub-pkg entirely and removes the corresponding
# Requires.
build.without = ["oscilloscope"]

# The upstream spec gates only the `%package -n oscilloscope` and
# `%files -n oscilloscope` blocks on the bcond. The `oscilloscope`
# console-script entry-point is still installed by `%pyproject_install`,
# leaving an unpackaged file when the bcond is off (rpmbuild fails). Strip
# it explicitly when oscilloscope is disabled.
[[components.tuna.overlays]]
description = "Remove unpackaged /usr/bin/oscilloscope when oscilloscope bcond is off"
type = "spec-append-lines"
section = "%install"
lines = [
    "%if %{without oscilloscope}",
    "rm -f %{buildroot}%{_bindir}/oscilloscope",
    "%endif",
]
