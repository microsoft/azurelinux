[component-templates.kmod-nvidia-open]
description = "Out-of-tree driver built against multiple kernel flavours"

[component-templates.kmod-nvidia-open.default-component-config]
spec = { type = "local", path = "kmod-nvidia-open.spec" }

[[component-templates.kmod-nvidia-open.default-component-config.source-files]]
filename = "open-gpu-kernel-modules-595.58.03.tar.gz"
hash-type = "SHA256"
hash = "e0c4659ddf15e4f4e19cee05b49f88c9ba08ef3add0dfe08249798f58d0fe75e"
origin = { type = "download", uri = "https://github.com/NVIDIA/open-gpu-kernel-modules/archive/refs/tags/595.58.03.tar.gz" }

[[component-templates.kmod-nvidia-open.matrix]]
axis = "kernel"

# Each value represents a kernel flavour. The key becomes part of the
# expanded component name (e.g. kmod-nvidia-open-default).
# The spec uses %{kernel_flavour-} in BuildRequires — when empty it
# resolves to "kernel-devel" (the default unsuffixed kernel).
# To add a new flavour, add a new entry here (e.g. [....values.hci.build]
# defines = { kernel_flavour = "hci" }).
[component-templates.kmod-nvidia-open.matrix.values.default.build]
defines = { kernel_flavour = "" }
