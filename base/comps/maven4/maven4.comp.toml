[components.maven4]

# Backport of upstream Fedora rawhide commit 4b6c6ee: remove openjdk21 binding.
# https://src.fedoraproject.org/rpms/maven4/c/4b6c6ee
# AZL only ships java-25-openjdk; there is no java-21-openjdk, so the
# maven4-openjdk21 subpackage has an unsatisfiable dependency.

[[components.maven4.overlays]]
description = "Remove openjdk21 conf file creation — AZL does not ship java-21-openjdk"
type = "spec-search-replace"
section = "%install"
regex = "echo JAVA_HOME=.*/jre-21-openjdk >.*maven.*-openjdk21\\.conf"
replacement = "# openjdk21 binding removed — AZL does not ship java-21-openjdk"

[[components.maven4.overlays]]
description = "Remove openjdk21 %jp_binding invocation"
type = "spec-search-replace"
section = "%install"
regex = "%jp_binding --verbose --variant openjdk21 [^\\n]*"
replacement = "# (openjdk21 jp_binding removed)"
