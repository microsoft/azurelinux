# Settings optimized for vms and containers running in the Microsoft
# Azure Cloud.

# Many of the Azure Cloud's networking services (e.g. Firewall, Load
# Balancer, etc) have a default TCP idle timeout of 4 minutes, after
# which TCP sessions are ended. Because the TCP keepalive standard
# (https://datatracker.ietf.org/doc/html/rfc9293#name-tcp-keep-alives)
# requires a default minimum of 2 hours (meaning, the first keepalive
# packet is sent after 2 idle hours), no TCP session with anything
# running inside the Azure Cloud will be kept alive using default TCP
# keepalive settings. This setting causes the first TCP keepalive
# packet to be sent after only 2 minutes of idle time, so idle TCP
# connections will not be closed by the Azure network.
net.ipv4.tcp_keepalive_time = 120
