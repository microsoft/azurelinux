[components.ant]

# Backport of upstream Fedora rawhide commit 4ca7a3b: remove openjdk21 binding.
# https://src.fedoraproject.org/rpms/ant/c/4ca7a3b
# AZL only ships java-25-openjdk; there is no java-21-openjdk, so the
# ant-openjdk21 subpackage has an unsatisfiable dependency.

[[components.ant.overlays]]
description = "Remove openjdk21 JDK binding — AZL does not ship java-21-openjdk"
type = "spec-search-replace"
section = "%install"
regex = "echo .JAVA_HOME=.*/jre-21-openjdk. > .*ant-openjdk21\\.conf"
replacement = "# openjdk21 binding removed — AZL does not ship java-21-openjdk"

[[components.ant.overlays]]
description = "Remove openjdk21 %jp_binding invocation"
type = "spec-search-replace"
section = "%install"
regex = "%jp_binding --verbose --variant openjdk21 [^\\n]*"
replacement = "# (openjdk21 jp_binding removed)"
