[components.maven]

# Backport of upstream Fedora rawhide commit e19767f: remove openjdk21 binding.
# https://src.fedoraproject.org/rpms/maven/c/e19767f
# AZL only ships java-25-openjdk; there is no java-21-openjdk, so the
# maven-openjdk21 subpackage has an unsatisfiable dependency.

[[components.maven.overlays]]
description = "Remove openjdk21 JDK binding lines — AZL does not ship java-21-openjdk"
type = "spec-search-replace"
section = "%install"
regex = '.*openjdk21.*'
replacement = ''
