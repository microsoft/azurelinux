[components.xmvn5]

# Backport of upstream Fedora rawhide commit b9afca4: remove openjdk21 toolchains.
# https://src.fedoraproject.org/rpms/xmvn5/c/b9afca4
# AZL only ships java-25-openjdk; there is no java-21-openjdk, so the
# xmvn5-toolchain-openjdk21 subpackage has an unsatisfiable dependency.

[[components.xmvn5.overlays]]
description = "Remove openjdk21 toolchain install — AZL does not ship java-21-openjdk"
type = "spec-search-replace"
section = "%install"
regex = "install -p -m 644 %\\{SOURCE21\\} .*toolchains-openjdk21\\.xml"
replacement = "# openjdk21 toolchain install removed — AZL does not ship java-21-openjdk"

[[components.xmvn5.overlays]]
description = "Remove openjdk21 toolchain %jp_binding invocation"
type = "spec-search-replace"
section = "%install"
regex = "%jp_binding --verbose.*toolchain-openjdk21[^\\n]*"
replacement = "# (openjdk21 toolchain jp_binding removed)"
