[components.uboot-tools]

[components.uboot-tools.build]
# Disable the "toolsonly" bcond to skip building firmware images for ARM dev
# boards (Raspberry Pi, Rockchip, Allwinner, etc.). These require
# arm-trusted-firmware-armv8 and crust-firmware which are not available in
# Azure Linux. The core U-Boot CLI tools (mkimage, fw_printenv, etc.) are
# still built on all architectures.
without = ["toolsonly"]
