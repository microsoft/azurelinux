[components.nghttp2]

# nghttp2's mingw support is enabled in Fedora-derived builds of the upstream spec.
# mingw support is out of scope for Azure Linux, and enabling it presently brings in
# dependencies on Python 3.11, which we do not support.
[[components.nghttp2.overlays]]
description = "Disable mingw support"
type = "spec-search-replace"
regex = '^%global with_mingw 1$'
replacement = '%global with_mingw 0'
