[components.xclock]

# Upstream fix: https://src.fedoraproject.org/rpms/xclock/c/1e407488967006428f14fa87fe0cd63e6cf77ce0
[[components.xclock.overlays]]
description = "Pass --force to autoreconf so autopoint overwrites the locally modified config.rpath. Fixed upstream in Fedora rawhide (xclock-1.1.1-11)."
type = "spec-search-replace"
section = "%build"
regex = 'autoreconf -v --install'
replacement = 'autoreconf -v --install --force'
