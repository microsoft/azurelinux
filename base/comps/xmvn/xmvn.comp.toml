[components.xmvn]

# Backport of upstream Fedora rawhide commit 2c9d321: remove openjdk21 toolchains.
# https://src.fedoraproject.org/rpms/xmvn/c/2c9d321
# AZL only ships java-25-openjdk; there is no java-21-openjdk, so the
# xmvn-toolchain-openjdk21 subpackage has an unsatisfiable dependency.

[[components.xmvn.overlays]]
description = "Remove openjdk21 toolchain lines — AZL does not ship java-21-openjdk"
type = "spec-search-replace"
section = "%install"
regex = '.*openjdk21.*'
replacement = ''
