[components.jss]

# AZL builds NSS 3.120+ which includes PQC auth defs (ML-DSA) in ssl_auth_size.
# JSS's SSLCipher.c has a PR_STATIC_ASSERT that auth_alg_defs[] matches ssl_auth_size,
# but the PQC entries in auth_alg_defs[] are gated on NSS_VERSION_PQC_DEF, which the
# spec only enables for RHEL >= 10.  Since AZL's NSS always has PQC defs, we
# unconditionally supply the flag the spec expects to work with nss >= 3.121.0
[[components.jss.overlays]]
description = "Enable PQC NSS flag unconditionally for AZL4 — the upstream spec gates this on RHEL >= 10, but AZL4 ships nss >= 3.121.0 (the PQC-capable version) and is not detected as RHEL."
type = "spec-search-replace"
regex = '%if 0%\{\?rhel\} && 0%\{\?rhel\} >= 10'
replacement = "%if 1"
