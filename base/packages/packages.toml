#
# Package publish configuration
#
# Project-wide default: unless otherwise specified, packages are published to sdk.
#
# Group overrides are split into separate files:
#   base.packages.toml       -> rpm-base   (intentional, fully supported)
#   sdk.packages.toml        -> rpm-sdk    (everything else: built but unsupported)
#   exceptions.packages.toml -> rpm-sdk    (curated carve-outs from base SRPMs)
#
# Policy: every binary RPM produced by an SRPM must publish to the same channel,
# unless that subpackage is explicitly carved out in `exceptions.packages.toml`.
#

includes = ["*.packages.toml"]

[default-package-config]
publish = { channel = "rpm-sdk" }
