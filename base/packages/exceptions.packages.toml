    # ----------------------------------------------------------------
    # Perl *-tests sub-pkgs (23 entries) — carved from base.
    #
    # These sub-packages ship the parent perl module's upstream test
    # corpus (t/*.t scripts, fixtures, sample data). They are not
    # required at runtime by anything other than someone re-running
    # the module's own self-test suite, which is not a base-supported
