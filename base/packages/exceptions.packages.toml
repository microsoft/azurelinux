    "nbdkit-gcs-plugin", # srpm: nbdkit
    # GCE Pacemaker fence agent; carve to sdk (Azure-focused distro), analogous to fence-agents-aws.
    "fence-agents-gce", # srpm: fence-agents
    # PEP-508 optional-deps sub-packages whose extras pull in deps not in base; main pkgs remain in base
    "python-systemd-doc", # srpm: python-systemd
    # PEP-508 +extras sub-package; optional dep not in base
    "python3-dns+doh", # srpm: python-dns
    "python3-dns+doq", # srpm: python-dns
    "python3-dns+trio", # srpm: python-dns
    # PEP-508 +extras sub-package; optional dep not in base
    "python3-fsspec+dask", # srpm: python-fsspec
