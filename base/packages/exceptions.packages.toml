    "python3-jsonschema+format", # srpm: python-jsonschema
    "python3-jsonschema+format-nongpl", # srpm: python-jsonschema
    # PEP-508 +extras sub-package; optional dep not in base
    "python3-lxml+cssselect", # srpm: python-lxml
    # PEP-508 +extras sub-package; optional dep not in base
    "python3-networkx+extra", # srpm: python-networkx
