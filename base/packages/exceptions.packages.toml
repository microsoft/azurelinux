#
# exceptions-packages publish configuration
#

# This group is the *single, curated* escape hatch from the
# "every binary RPM produced by an SRPM must publish to the same channel"
# policy enforced by `scripts/split-repo-by-channel.py`.
#
# Each package listed here is a sibling sub-package of an SRPM whose other
# binary RPMs belong in `base`, but where this specific sub-package is
# explicitly carved out and published to `sdk` instead. Typical reasons:
#
#   - Windows cross-compile artifacts (mingw32-*, mingw64-*, rust windows-gnu
#     std libs) that are produced by otherwise-base SRPMs but have no place
#     in a supported Linux runtime.
#
# Every entry MUST have a corresponding exception in
# `scripts/srpm-consistency-allowlist.toml` so the consistency check
# remains green. Keep this list minimal and surgical -- prefer demoting
# the whole SRPM whenever the base footprint is small enough to make that
# reasonable.

[package-groups.exceptions-packages]
description = "curated per-SRPM channel-consistency exceptions"
default-package-config.publish.channel = "rpm-sdk"
packages = [
    # Qt5 GUI for editing doxygen configs; pulls full Qt5 stack.
    "doxygen-doxywizard", # srpm: doxygen
    # LaTeX/PDF output backend; pulls full TeXLive (~6500 pkgs).
    "doxygen-latex", # srpm: doxygen

