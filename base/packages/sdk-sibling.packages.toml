#
# sdk-sibling-packages publish configuration
#

# This group contains sub-packages that are "siblings" to packages
# in `sdk`. In other words, none of these packages were selected for
# inclusion in `sdk` based on dependency criteria, but they were
# produced by building source components that also produced packages
# that *were* selected for inclusion in `sdk`.
