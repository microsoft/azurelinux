#
# sdk-packages publish configuration
#

# This group includes every package built but published to the unsupported
# `sdk` channel. It covers:
#   - packages required to build `base` packages (and their transitive
#     build/runtime closure),
#   - sub-packages of base-contributing SRPMs that are intentionally NOT in
#     `base` (sibling sub-packages of `base` whose SRPMs we choose to ship
#     here rather than pull entirely into `base`),
#   - sub-packages of SRPMs whose binaries are all sdk-only,
#   - packages whose disposition has not yet been individually curated
#     (formerly tracked in `todo.packages.toml`).
#
# Policy: every binary RPM produced by an SRPM must publish to the same
# channel as its peers. Anything in `base.packages.toml` therefore implies
# its full set of SRPM siblings is also in `base`, and everything else
# belongs here.
[package-groups.sdk-packages]
description = "sdk packages"
default-package-config.publish.channel = "rpm-sdk"
