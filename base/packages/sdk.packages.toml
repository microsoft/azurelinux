#
# sdk-packages publish configuration
#

# This group includes the set of packages that are not already in `base` but
# required to *build* the packages present in `base`. This set of packages is
# also recursively closed under build and runtime dependencies. In other words,
# the packages present here along with the packages in `base` are sufficient
# to build all packages in `base` and all packages here.
