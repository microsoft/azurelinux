[images.vm-base]
description = "VM Base Image"
definition = { type = "kiwi", path = "vm-base/vm-base.kiwi" }
tests.test-suites = [{ name = "static-image-checks" }]

[images.vm-base.capabilities]
machine-bootable = true
container = false
systemd = true
runtime-package-management = true

[images.container-base]
description = "Container Base Image"
definition = { type = "kiwi", path = "container-base/container-base.kiwi", profile = "core" }
tests.test-suites = [{ name = "static-image-checks" }]

[images.container-base.capabilities]
machine-bootable = false
container = true
systemd = false
runtime-package-management = true

[images.container-distroless-minimal]
description = "Container Distroless Minimal Image"
definition = { type = "kiwi", path = "container-base/container-base.kiwi", profile = "distroless-minimal" }

[images.container-distroless-base]
description = "Container Distroless Base Image"
definition = { type = "kiwi", path = "container-base/container-base.kiwi", profile = "distroless-base" }

[images.container-distroless-debug]
description = "Container Distroless Debug Image"
definition = { type = "kiwi", path = "container-base/container-base.kiwi", profile = "distroless-debug" }

# NOTE:
# sudo dnf install -y kiwi-cli
# sudo kiwi --loglevel 10 \
#     --kiwi-file container-base.kiwi \
#     system build \
#     --description ./container-base \
#     --target-dir <output_dir> \
#     --add-repo='file:///home/username/some/dir/with/private/rpms,rpm-md,azl,1

# ---- Test suites ----

# Single shared pytest suite for static (offline) image validation. The
# tests directory contains shared cases plus per-image-name subdirs. Each
# image receives its own --image-name and --capabilities so tests can
# self-select via @pytest.mark.image and @pytest.mark.require_capability.
[test-suites.static-image-checks]
type = "pytest"
description = "Offline image validation (shared + image-specific tests)"

[test-suites.static-image-checks.pytest]
working-dir = "tests"
install = "pyproject"
test-paths = ["cases/"]
extra-args = [
    "--image-path", "{image-path}",
    "--image-name", "{image-name}",
    "--capabilities", "{capabilities}",
]
