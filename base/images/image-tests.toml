# Image Test References
#
# Images reference centralized test suites from tests.toml by name.
# Selector criteria live in tests.toml; images can override selectors inline
# (e.g., narrow to specific test cases) using fields on each entry.

[images.vm-base.tests]
skus = ["NCv3-series", "PremiumV2_ZRS"]

[[images.vm-base.tests.test-suites]]
name = "vm-smoke"

[[images.vm-base.tests.test-suites]]
name = "vm-network-functional"

[[images.vm-base.tests.test-suites]]
name = "vm-trident-crypto-functional"

[[images.vm-base.tests.test-suites]]
name = "vm-bvt-smoke"

[images.container-base.tests]
skus = ["Standard_F72s_v2", "VpnGw4"]

[[images.container-base.tests.test-suites]]
name = "container-smoke"

# Override: run only specific test cases from container-network-functional
[[images.container-base.tests.test-suites]]
name = "container-network-functional"
testcase_names = ["verify_sriov_basic"]

[[images.container-base.tests.test-suites]]
name = "container-bvt-smoke"