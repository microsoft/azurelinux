# LISA Default Test Suite
# Generic pass-through — accepts ANY test selectors and ANY image.
# Use this when the Validation Service drives all test selection.
#
# FIELD SEMANTICS:
#   Fixed value   → API must match (or omit → TOML value used)
#   "*" wildcard  → API must provide a concrete value
#   {options=[...]} → API must pick a subset from allowed values
#   Absent field  → API must NOT include it

[testsuite]
name = "lisa-default"


# Mostly wildcards → Validation Service decides what to run.
# At least one selector field must be actively provided in the API request.
# TOML defaults alone do not satisfy this requirement.
[selector]
area     = "*"                    # any LISA area
category = "*"                    # any LISA category
priority = {options = [0, 1, 2, 3, 4]}  # pick from 0-4
tags     = "*"                    # any tags
testcase_names    = ["*"]         # wildcard list: any test case names

# "*" → image is fully provided in the fulfilled contract.
# No image definition file, no constraints — Validation Service decides.
[image]
definition = "*"

[platform]
location = "eastus"