include = ["**/*.toml"]
exclude = ["base/out/**/*.toml", "base/build/**/*.toml"]

[[rule]]
include = ["base/tests/**/*.toml"]

[rule.schema]
path = "./external/schemas/tee-tests.schema.json"

[[rule]]
include = ["azldev.toml", "distro/**/*.toml", "base/**/*.toml"]
exclude = ["base/tests/**/*.toml"]

[rule.schema]
path = "./external/schemas/azldev.schema.json"
