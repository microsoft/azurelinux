trigger: none

parameters:
  - name: debug
    type: boolean
    default: false
    displayName: "Run in debug mode"

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

variables:
  - group: "Agent pools (DEV)"
  - group: "Raw toolchain info"
  - name: system.debug
    value: "${{ parameters.debug }}"

extends:
  template: v2/OneBranch.NonOfficial.CrossPlat.yml@templates
  parameters:
    featureFlags:
      use1esentry: false # this disables 1es entrypoint which is a workaround for issues from IcM https://portal.microsofticm.com/imp/v5/incidents/details/743308145/summary
      LinuxHostVersion:
        Network: R1
    globalSdl:
      credscan:
        suppressionsFile: .config/CredScanSuppressions.json
    stages:
      - template: ../templates/PackageBuildPRCheck.yml@self
        parameters:
          dailyBuildID: "lkg"
