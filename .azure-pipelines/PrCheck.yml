# Microsoft Corporation
#
# PR check pipeline — authenticates via Workload Identity Federation (OIDC)
# and calls the Control Tower prcheck API with PR context.
#
# Prerequisites (ADO / Azure Portal):
#   1. Entra ID App Registration with audience URI
#      "api://<ControlTower-ClientId>" (see variable group below).
#   2. Federated identity credential on the app registration for the ADO
#      service connection (issuer: https://vstoken.dev.azure.com/<org-id>,
#      subject: sc://<org>/<project>/<service-connection-name>).
#   3. ARM service connection in ADO project settings using Workload Identity
#      Federation (manual).
#   4. ADO branch policy or pipeline PR trigger configured to fire on PRs.
#
# Variable Group (ADO Pipelines > Library):
#   Name: "ControlTower-PRCheck"
#   Required variables:
#     - ApiAudience          : Entra ID audience URI for the Control Tower app
#     - ApiBaseUrl           : Base URL of the Control Tower service
#     - AzldevCommit         : Commit hash for azldev (go install ...@<commit>)

# Trigger controlled by ADO branch policy — not YAML triggers.
trigger: none

pr: none

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    featureFlags:
      golang:
        internalModuleProxy:
          enabled: true
      LinuxHostVersion:
        Network: R1
    stages:
      - stage: PRCheck
        # variables:
        #   - group: "Agent pools (DEV)"
        jobs:
          - job: CallControlTowerAPI
            pool:
              type: linux
              # isCustom: true
              # name: $(DEV_AMD64_Managed_AZL3)
            variables:
              - group: ControlTower-PRCheck
              - name: ob_outputDirectory
                value: $(Build.ArtifactStagingDirectory)/output
              - name: ob_artifactBaseName
                value: prcheck
              - name: LinuxContainerImage
                value: mcr.microsoft.com/onebranch/azurelinux/build:3.0
            steps:
              - task: AzureCLI@2
                displayName: "Acquire Entra ID Bearer Token"
                inputs:
                  azureSubscription: CT-PR-Checks-ServiceConnection
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -euo pipefail

                    RESPONSE=$(az account get-access-token --resource "$API_AUDIENCE" -o json)

                    TOKEN=$(jq -r .accessToken <<< "$RESPONSE")
                    EXPIRES=$(jq -r .expiresOn <<< "$RESPONSE")

                    if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
                      echo "##[error]Failed to acquire bearer token."
                      exit 1
                    fi

                    # Store as a secret pipeline variable for subsequent steps.
                    echo "##vso[task.setvariable variable=API_TOKEN;issecret=true]$TOKEN"
                    echo "Bearer token acquired (expires: $EXPIRES)"
                env:
                  API_AUDIENCE: $(ApiAudience)

              - script: |
                  set -euo pipefail
                  echo "Installing azldev@${AZLDEV_COMMIT}..."
                  go install "github.com/microsoft/azure-linux-dev-tools/cmd/azldev@${AZLDEV_COMMIT}"
                  echo "##vso[task.prependpath]$(go env GOPATH)/bin"
                  export PATH="$(go env GOPATH)/bin:$PATH"
                  azldev --version
                displayName: "Install azldev"
                env:
                  AZLDEV_COMMIT: $(AzldevCommit)
                condition: false # Disable for now to test the rest of the pipeline.

              - script: |
                  set -euo pipefail

                  echo "Rendering specs..."
                  azldev component render -a -o specs

                  # Check for any new or modified files under specs/.
                  CHANGED=$(git status --porcelain -- specs/ || true)
                  if [[ -n "$CHANGED" ]]; then
                    echo "##[error]Rendered specs are out of date. Run 'azldev component render -a' locally and commit the results."
                    echo "Changed files:"
                    echo "$CHANGED"
                    exit 1
                  fi
                  echo "Rendered specs are up to date."
                displayName: "Verify rendered specs are up to date"
                condition: false # Disable for now to test the rest of the pipeline without needing to update specs.

                # TODO: Must work for both pull request and continuous integration scenarios. The latter is triggered by GitHub's merge queus,
                #       so we should be able to extract the target branch name from the source branch name (e.g. "refs/heads/ gh-readonly-queue/{base_branch}/pr-{pr_number}-{head_sha}")
                #       and then use 'git rev-parse' to get the commit hashes.
              - script: |
                  set -euo pipefail

                  echo "TODO"

                  source_hash="FIND_ME"
                  target_hash="FIND_ME"

                  echo "##vso[task.setvariable variable=sourceCommit]$source_hash"
                  echo "##vso[task.setvariable variable=targetCommit]$target_hash"
                env:
                  UPSTREAM_REPO_URL: $(Build.Repository.Uri)
                  PR_TARGET_BRANCH: $(System.PullRequest.TargetBranch)
                  REPO_NAME: $(Build.Repository.Name)
                  SOURCE_BRANCH: $(Build.SourceBranch)
                  SOURCE_COMMIT: $(Build.SourceVersion)
                  TEAM_PROJECT: $(System.TeamProject)
                displayName: 'Determine source and target commit hashes'

                # TODO: Requires the source and target commit hashes to be passed to 'azldev component changes $sourceCommit $targetCommit' to get the list of affected components.
                #       Must work for both pull request and continuous integration scenarios. The latter is triggered by GitHub's merge queus,
                #       so we should be able to extract the target branch name from the source branch name (e.g. "refs/heads/ gh-readonly-queue/{base_branch}/pr-{pr_number}-{head_sha}")
                #       and then use 'git rev-parse' to get the commit hashes.
              - script: |
                  set -euo pipefail

                  echo "TODO"

                  COMPONENTS="ComponentA,ComponentB" # Placeholder for actual component list from API response.

                  echo "##vso[task.setvariable variable=components]$COMPONENTS"
                env:
                  UPSTREAM_REPO_URL: $(Build.Repository.Uri)
                  PR_TARGET_BRANCH: $(System.PullRequest.TargetBranch)
                  REPO_NAME: $(Build.Repository.Name)
                  SOURCE_BRANCH: $(Build.SourceBranch)
                  SOURCE_COMMIT: $(sourceCommit)
                  TARGET_COMMIT: $(targetCommit)
                  TEAM_PROJECT: $(System.TeamProject)
                displayName: 'Determine affected components'

                # TODO: Clean-up unused environment variables in the above steps and this step once the commit hash extraction logic is implemented.
              - script: |
                  set -euo pipefail

                  echo "Token length: ${#API_TOKEN}"

                  # Construct the repo URI from ADO predefined variables.
                  REPO_URI="${UPSTREAM_REPO_URL}${TEAM_PROJECT}/_git/${REPO_NAME}"

                  # Build the JSON payload matching the Control Tower schema.
                  PAYLOAD=$(jq -n \
                    --arg components      "$COMPONENTS" \
                    --arg repoUri         "$REPO_URI" \
                    --arg sourceCommitSha "$SOURCE_COMMIT" \
                    '{
                      components:       ($components | split(",") | map(. | trim)),
                      repoUri:         $repoUri,
                      sourceCommitSha: $sourceCommitSha
                    }')

                  # azldev component render -a

                  echo "Calling Control Tower 'prcheck' endpoint..."
                  echo "Payload:"
                  echo "$PAYLOAD" | jq .

                  HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
                    --connect-timeout 10 --max-time 60 \
                    -X POST "${API_BASE_URL}/api/Scenario/prcheck" \
                    -H "Authorization: Bearer $API_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD")

                  echo "HTTP status: $HTTP_CODE"

                  if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
                    echo "##[error]Control Tower returned HTTP $HTTP_CODE"
                    jq . response.json 2>/dev/null || echo "(non-JSON response body omitted)"
                    exit 1
                  fi

                  echo "Service response:"
                  jq . response.json
                env:
                  API_BASE_URL: $(ApiBaseUrl)
                  API_TOKEN: $(API_TOKEN)
                  COMPONENTS: $(components)
                  UPSTREAM_REPO_URL: $(Build.Repository.Uri)
                  PR_TARGET_BRANCH: $(System.PullRequest.TargetBranch)
                  REPO_NAME: $(Build.Repository.Name)
                  SOURCE_BRANCH: $(Build.SourceBranch)
                  SOURCE_COMMIT: $(Build.SourceVersion)
                  TEAM_PROJECT: $(System.TeamProject)
                displayName: 'Call Control Tower "prcheck" API'
