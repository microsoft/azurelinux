# Microsoft Corporation
#
# PR check pipeline — authenticates via Workload Identity Federation (OIDC)
# and calls the Control Tower prcheck API with PR context.
#
# Prerequisites (ADO / Azure Portal):
#   1. Entra ID App Registration with audience URI
#      "api://<ControlTower-ClientId>" (see variable group below).
#   2. Federated identity credential on the app registration for the ADO
#      service connection (issuer: https://vstoken.dev.azure.com/<org-id>,
#      subject: sc://<org>/<project>/<service-connection-name>).
#   3. ARM service connection in ADO project settings using Workload Identity
#      Federation (manual), named to match $(ServiceConnection).
#   4. ADO branch policy or pipeline PR trigger configured to fire on PRs.
#
# Variable Group (ADO Pipelines > Library):
#   Name: "ControlTower-PRCheck"
#   Required variables:
#     - ServiceConnection   : Name of the ARM/WIF service connection
#     - ApiAudience          : Entra ID audience URI for the Control Tower app
#     - ApiBaseUrl           : Base URL of the Control Tower service

# Trigger controlled by ADO branch policy — not YAML triggers.
trigger: none

pr: none

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    stages:
      - stage: PRCheck
        variables:
          - group: "Agent pools (DEV)"
        jobs:
          - job: CallControlTowerAPI
            pool:
              type: linux
              isCustom: true
              name: $(DEV_AMD64_Managed_AZL3)
            variables:
              - group: ControlTower-PRCheck
              - name: ob_outputDirectory
                value: $(Build.ArtifactStagingDirectory)/output
              - name: ob_artifactBaseName
                value: prcheck
            steps:
              # ── Step 1: Acquire an Entra ID bearer token ─────────────
              - task: AzureCLI@2
                displayName: 'Acquire Entra ID Bearer Token'
                inputs:
                  azureSubscription: $(ServiceConnection)
                  scriptType: bash
                  scriptLocation: inlineScript
                  # Exposes $servicePrincipalId, $idToken, $tenantId in the
                  # script environment — useful for debugging or manual OIDC
                  # exchange if needed.
                  addSpnToEnvironment: true
                  inlineScript: |
                    set -euo pipefail

                    echo "Authenticating via Workload Identity Federation..."

                    TOKEN=$(az account get-access-token \
                      --resource "$(ApiAudience)" \
                      --query accessToken \
                      -o tsv)

                    if [[ -z "$TOKEN" ]]; then
                      echo "##vso[task.logissue type=error]Failed to acquire bearer token."
                      exit 1
                    fi

                    # Store as a secret pipeline variable for subsequent steps.
                    echo "##vso[task.setvariable variable=API_TOKEN;issecret=true]$TOKEN"
                    echo "Bearer token acquired (expires: $(az account get-access-token \
                      --resource "$(ApiAudience)" --query expiresOn -o tsv))"

              # ── Step 2: Call the Control Tower prcheck API ───────────
              - script: |
                  set -euo pipefail

                  # Construct the repo URI from ADO predefined variables.
                  REPO_URI="$(System.CollectionUri)$(System.TeamProject)/_git/$(Build.Repository.Name)"

                  # Build the JSON payload matching the Control Tower schema.
                  PAYLOAD=$(jq -n \
                    --arg repoUri        "$REPO_URI" \
                    --argjson prNumber    "$(System.PullRequest.PullRequestNumber)" \
                    --arg sourceBranch    "$(System.PullRequest.SourceBranch)" \
                    --arg sourceCommitSha "$(System.PullRequest.SourceCommitId)" \
                    --arg targetBranch    "$(System.PullRequest.TargetBranch)" \
                    --arg targetCommitSha "$(Build.SourceVersion)" \
                    '{
                      repoUri:         $repoUri,
                      prNumber:        $prNumber,
                      sourceBranch:    $sourceBranch,
                      sourceCommitSha: $sourceCommitSha,
                      targetBranch:    $targetBranch,
                      targetCommitSha: $targetCommitSha
                    }')

                  echo "Calling Control Tower prcheck for PR #$(System.PullRequest.PullRequestNumber)..."
                  echo "Payload:"
                  echo "$PAYLOAD" | jq .

                  HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
                    -X POST "$(ApiBaseUrl)/api/Scenario/prcheck" \
                    -H "Authorization: Bearer $(API_TOKEN)" \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD")

                  echo "HTTP status: $HTTP_CODE"

                  if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
                    echo "##vso[task.logissue type=error]Control Tower returned HTTP $HTTP_CODE"
                    cat response.json
                    exit 1
                  fi

                  echo "Service response:"
                  cat response.json | jq .
                displayName: 'Call Control Tower prcheck API'
