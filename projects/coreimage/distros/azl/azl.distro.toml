[distros.azurelinux]
description = "Azure Linux"
default-version = "3.0"

[distros.azurelinux.versions.'3.0']
description = "Azure Linux 3.0"
release-ver = "3.0"
mock-config-x86_64 = "mock/azurelinux-3-x86_64.cfg"
mock-config-aarch64 = "mock/azurelinux-3-aarch64.cfg"

# For now, we hard-code a default upstream of Fedora.
[distros.azurelinux.versions.'3.0'.default-component-config]
spec = { type = "upstream", upstream-distro = { name = "fedora", version = "42" } }

[distros.azurelinux.versions.'4.0']
description = "Azure Linux 4.0"
release-ver = "4.0"
mock-config-x86_64 = "mock/azurelinux-4-x86_64.cfg"
mock-config-aarch64 = "mock/azurelinux-4-aarch64.cfg"

[distros.azurelinux.versions.'4.0'.default-component-config]
spec = { type = "upstream", upstream-distro = { name = "fedora", version = "42" } }

[distros.azurelinux.versions.'4.0'.default-component-config.build.defines]
dist = ".azl4"
vendor = "Microsoft Corporation"
distribution = "Azure Linux"
azl = "4"
